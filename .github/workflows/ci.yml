name: Life OS

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cp .env.example .env
          sed -i 's/change-this-postgres-password/ci-postgres-password/g' .env
          sed -i 's/change-this-long-random-secret/ci-secret-key-for-build/g' .env
          sed -i 's/change-this-login-password/ci-login-password/g' .env

      - name: Build containers
        run: docker compose build

  test:
    name: test
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: life_os_test
          POSTGRES_USER: life_os
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U life_os -d life_os_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: "postgresql+psycopg://life_os:ci-postgres-password@localhost:5432/life_os_test"
          SECRET_KEY: ci-secret-key-for-tests
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: alembic -c alembic.ini upgrade head

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          SECRET_KEY: ci-secret-key-for-tests
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: pytest -q

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/life-os-key
          chmod 600 ~/.ssh/life-os-key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to EC2
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/life-os-key" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}/"

      - name: Write production env
        run: |
          cat > production.env <<'EOF'
          ${{ secrets.PRODUCTION_ENV_FILE }}
          EOF
          scp -i ~/.ssh/life-os-key production.env "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}/.env"

      - name: Deploy compose stack
        run: |
          ssh -i ~/.ssh/life-os-key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd '${{ secrets.EC2_APP_DIR }}' && docker compose up -d --build"

      - name: Create or update Life OS user
        run: |
          ssh -i ~/.ssh/life-os-key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd '${{ secrets.EC2_APP_DIR }}' && docker compose run --rm backend python scripts/create_user.py"
